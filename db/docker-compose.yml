version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: socket-postgres
    restart: always
    environment:
      POSTGRES_DB: socket_driven
      POSTGRES_USER: socket_user
      POSTGRES_PASSWORD: socket_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: