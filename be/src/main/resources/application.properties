spring.application.name=chat
server.port=${SERVER_PORT:8081}

spring.datasource.url=jdbc:postgresql://localhost:5432/socket_driven
spring.datasource.username=socket_user
spring.datasource.password=socket_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.jwt.access-minutes=60
app.jwt.refresh-days=7

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

app.upload.dir=${user.home}/.socket-driven/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
